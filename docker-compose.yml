services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_brain"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-brain-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/open_brain
      SERVER_PORT: 3333
      # AI task dispatch — translate host paths in the DB to container mounts
      HOST_WORKSPACES_ROOT: ${HOST_WORKSPACES_ROOT:-${HOME}/Documents/GitHub}
      CONTAINER_WORKSPACES_ROOT: /workspaces
      # Long-lived Claude Code OAuth token (from `claude setup-token` on host)
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Supabase REST API access for dispatcher → tasks state updates
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:-}
    ports:
      - "3333:3333"
    volumes:
      # Claude Code state directory (sessions, plugins, mcp config, history).
      # We do NOT bind-mount ~/.claude.json — atomic rewrites on the host swap
      # the inode and break a single-file bind mount inside the container.
      # Auth comes from CLAUDE_CODE_OAUTH_TOKEN env var; the Dockerfile creates
      # a default empty config file at /home/node/.claude.json.
      - ${HOME}/.claude:/home/node/.claude
      # Container-isolated git config: identity + credential.helper=store, kept
      # separate from the host ~/.gitconfig so we don't pollute it with a PAT-
      # based helper. Generated by the dispatcher setup, contains no secrets.
      - ${HOME}/.config/open-brain-dispatcher/gitconfig:/home/node/.gitconfig:ro
      # Container-isolated git credentials file (PAT for github.com pushes).
      # Generated from `gh auth token` at setup time. Contains a secret — keep
      # mode 0600 on the host.
      - ${HOME}/.config/open-brain-dispatcher/git-credentials:/home/node/.git-credentials:ro
      # Repos that AI tasks can work in
      - ${HOST_WORKSPACES_ROOT:-${HOME}/Documents/GitHub}:/workspaces

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: open-brain-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - api
    profiles: ["tunnel"]

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-brain-mcp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/open_brain
    command: ["node", "mcp-server.js"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["mcp"]
    stdin_open: true

volumes:
  pgdata:
