services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: open-brain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_brain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_brain"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-brain-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/open_brain
      SERVER_PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: open-brain-mcp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/open_brain
    command: ["node", "mcp-server.js"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["mcp"]
    stdin_open: true

volumes:
  pgdata:
